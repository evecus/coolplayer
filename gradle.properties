org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
org.gradle.internal.http.connectionTimeout=300000
org.gradle.internal.http.socketTimeout=300000
org.gradle.parallel=true
org.gradle.caching=true

# 显式配置代理（沙箱环境必需）
systemProp.http.proxyHost=127.0.0.1
systemProp.http.proxyPort=18080
systemProp.https.proxyHost=127.0.0.1
systemProp.https.proxyPort=18080
systemProp.http.nonProxyHosts=localhost|127.0.0.1|.svc|.cluster.local
systemProp.https.nonProxyHosts=localhost|127.0.0.1|.svc|.cluster.local
